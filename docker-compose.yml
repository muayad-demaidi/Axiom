version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: axiom
      POSTGRES_PASSWORD: axiom_password
      POSTGRES_DB: axiom_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axiom -d axiom_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://axiom:axiom_password@db:5432/axiom_db
      - ENVIRONMENT=production
      - AI_INTEGRATIONS_OPENAI_KEY=${OPENAI_API_KEY:-}
      - SECRET_KEY=generate_a_strong_secret_key_in_production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --workers 4"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - BACKEND_URL=http://backend:8000
    ports:
      - "5000:5000"
    depends_on:
      - backend

volumes:
  postgres_data:

<style>
.pred-wrap { max-width: 680px; padding: 1rem 0; font-family: var(--font-sans); }
.pred-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1.5rem; }
.pred-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.25rem; }
.pred-label { font-size: 12px; color: var(--color-text-secondary); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.05em; }
.pred-val { font-size: 15px; font-weight: 500; color: var(--color-text-primary); }
.seg-btn { padding: 6px 14px; border: 0.5px solid var(--color-border-secondary); border-radius: 20px; background: transparent; font-size: 13px; cursor: pointer; color: var(--color-text-secondary); transition: all 0.15s; }
.seg-btn.active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-info); font-weight: 500; }
.seg-group { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.slider-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
.slider-row input[type=range] { flex: 1; }
.slider-num { font-size: 14px; font-weight: 500; min-width: 32px; text-align: right; color: var(--color-text-primary); }
.result-box { background: var(--color-background-info); border: 0.5px solid var(--color-border-info); border-radius: var(--border-radius-lg); padding: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1.5rem; }
.result-score { font-size: 56px; font-weight: 500; color: var(--color-text-info); line-height: 1; }
.result-details { flex: 1; }
.result-title { font-size: 13px; color: var(--color-text-info); margin: 0 0 4px; }
.result-range { font-size: 13px; color: var(--color-text-secondary); margin: 0; }
.compare-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.compare-cell { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 8px; text-align: center; }
.compare-subj { font-size: 11px; color: var(--color-text-secondary); margin: 0 0 4px; }
.compare-score { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.importance-bar { height: 6px; border-radius: 3px; background: var(--color-background-info); margin-top: 4px; }
.section-title { font-size: 13px; font-weight: 500; color: var(--color-text-secondary); margin: 0 0 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.feat-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.feat-name { font-size: 13px; color: var(--color-text-primary); min-width: 120px; }
.feat-bar-wrap { flex: 1; height: 6px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; }
.feat-bar { height: 100%; border-radius: 3px; background: var(--color-background-info); transition: width 0.4s; }
.feat-pct { font-size: 12px; color: var(--color-text-secondary); min-width: 32px; text-align: right; }
</style>

let mode='Online', subject='Math';

function setMode(v){
  mode=v;
  document.querySelectorAll('#mode-group .seg-btn').forEach(b=>{b.classList.toggle('active',b.textContent.trim()===(v==='Online'?'أونلاين':'أوفلاين'));});
  update();
}
function setSubject(v){
  subject=v;
  document.querySelectorAll('#subj-group .seg-btn').forEach(b=>{b.classList.toggle('active',b.dataset&&b.onclick&&b.onclick.toString().includes("'"+v+"'"));});
  document.querySelectorAll('#subj-group .seg-btn').forEach(b=>{
    const match=b.onclick.toString().match(/'([^']+)'/);
    if(match)b.classList.toggle('active',match[1]===v);
  });
  update();
}

function predict(m,s,f,h,r){
  const subset=RAW.filter(d=>d.m===m&&d.s===s);
  if(subset.length<3){
    const all=RAW.filter(d=>d.m===m);
    return predictFromData(all,f,h,r);
  }
  return predictFromData(subset,f,h,r);
}

function predictFromData(data,f,h,r){
  const n=data.length;
  let sf=0,sh=0,sr=0,se=0,sf2=0,sh2=0,sr2=0,sfe=0,she=0,sre=0;
  data.forEach(d=>{sf+=d.f;sh+=d.h;sr+=d.r;se+=d.e;sf2+=d.f*d.f;sh2+=d.h*d.h;sr2+=d.r*d.r;sfe+=d.f*d.e;she+=d.h*d.e;sre+=d.r*d.e;});
  const mf=sf/n,mh=sh/n,mr=sr/n,me=se/n;
  let vf=0,vh=0,vr=0,cfe=0,che=0,cre=0;
  data.forEach(d=>{
    vf+=(d.f-mf)**2;vh+=(d.h-mh)**2;vr+=(d.r-mr)**2;
    cfe+=(d.f-mf)*(d.e-me);che+=(d.h-mh)*(d.e-me);cre+=(d.r-mr)*(d.e-me);
  });
  const bf=cfe/Math.max(vf,0.001),bh=che/Math.max(vh,0.001),br=cre/Math.max(vr,0.001);
  const intercept=me-bf*mf-bh*mh-br*mr;
  const pred=intercept+bf*f+bh*h+br*r;
  return Math.min(100,Math.max(0,Math.round(pred)));
}

function getColor(score){
  if(score>=80)return'var(--color-text-success)';
  if(score>=65)return'var(--color-text-warning)';
  return'var(--color-text-danger)';
}

  const allSimilar=RAW.filter(d=>d.m===mode&&d.s===subject);
  if(allSimilar.length>0){
    const avg=Math.round(allSimilar.reduce((a,d)=>a+d.e,0)/allSimilar.length);
    document.getElementById('result-range').textContent=`متوسط ${mode==='Online'?'أونلاين':'أوفلاين'} + ${subject} في البيانات: ${avg}`;
  }

  const cg=document.getElementById('compare-grid');
  cg.innerHTML=SUBJECTS.map(s=>{
    const sc=predict(mode,s,f,h,r);
    const isActive=s===subject;
    return`<div class="compare-cell" style="${isActive?'border:1.5px solid var(--color-border-info);':''}" onclick="setSubject('${s}');this.closest('.pred-wrap').scrollTop=0">
      <p class="compare-subj">${s}</p>
      <p class="compare-score" style="color:${getColor(sc)}">${sc}</p>
    </div>`;
  }).join('');

  const ip=document.getElementById('importance-panel');
  const subset=RAW.filter(d=>d.m===mode&&d.s===subject);
  const data=subset.length>=5?subset:RAW.filter(d=>d.m===mode);
  const nn=data.length;
  const me2=data.reduce((a,d)=>a+d.e,0)/nn;
  let vf=0,vh=0,vr=0,cfe=0,che=0,cre=0;
  const mf=data.reduce((a,d)=>a+d.f,0)/nn;
  const mh=data.reduce((a,d)=>a+d.h,0)/nn;
  const mr=data.reduce((a,d)=>a+d.r,0)/nn;
  data.forEach(d=>{vf+=(d.f-mf)**2;vh+=(d.h-mh)**2;vr+=(d.r-mr)**2;cfe+=(d.f-mf)*(d.e-me2);che+=(d.h-mh)*(d.e-me2);cre+=(d.r-mr)*(d.e-me2);});
  const corF=cfe/Math.sqrt(vf*data.reduce((a,d)=>a+(d.e-me2)**2,0));
  const corH=che/Math.sqrt(vh*data.reduce((a,d)=>a+(d.e-me2)**2,0));
  const corR=cre/Math.sqrt(vr*data.reduce((a,d)=>a+(d.e-me2)**2,0));
  const features=[
    {name:'درجة الاستيعاب',cor:corR},
    {name:'مستوى التركيز',cor:corF},
    {name:'ساعات الدراسة',cor:corH}
  ].sort((a,b)=>Math.abs(b.cor)-Math.abs(a.cor));
  const maxC=Math.max(...features.map(x=>Math.abs(x.cor)));
  ip.innerHTML=features.map(x=>{
    const pct=Math.round(Math.abs(x.cor)/maxC*100);
    return`<div class="feat-row">
      <span class="feat-name">${x.name}</span>
      <div class="feat-bar-wrap"><div class="feat-bar" style="width:${pct}%"></div></div>
      <span class="feat-pct">${Math.round(Math.abs(x.cor)*100)}%</span>
    </div>`;
  }).join('');
}

update();
</script>

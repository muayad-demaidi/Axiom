name: Weekly Pulse Email

# Reliable external trigger for the Weekly Pulse digest. The Render free
# tier sleeps when idle, so an in-process scheduler can't be trusted —
# GitHub's cron fires this regardless and calls the protected endpoint.
on:
  schedule:
    # Every Sunday at 06:00 UTC.
    - cron: "0 6 * * 0"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

jobs:
  send-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger weekly pulse emails
        run: |
          code=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://axiom-q65c.onrender.com/api/cron/weekly-pulse" \
            -H "X-Cron-Secret: ${{ secrets.PULSE_CRON_SECRET }}" \
            --max-time 280)
          echo "HTTP $code"; cat /tmp/resp.json || true
          test "$code" = "200"
